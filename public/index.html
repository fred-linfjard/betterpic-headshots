<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetterPic AI Headshots</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, sans-serif; background: white; color: #111; max-width: 480px; margin: 0 auto; padding: 16px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .header h1 { font-size: 18px; font-weight: 700; color: #7A52F4; }
  .settings-btn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 4px; }
  .score-bar { border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 14px; font-weight: 600; display: none; }
  .score-bar.good { background: #f0fdf4; color: #16a34a; border: 1px solid #22c55e; }
  .score-bar.warning { background: #fffbeb; color: #d97706; border: 1px solid #f59e0b; }
  .score-bar.bad { background: #fef2f2; color: #dc2626; border: 1px solid #ef4444; }
  .drop-zone { border: 2px dashed #d1d5db; border-radius: 12px; padding: 40px 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #7A52F4; background: #f5f3ff; }
  .drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
  .drop-zone p { color: #6b7280; margin-bottom: 8px; font-size: 15px; }
  .drop-zone .hint { font-size: 12px; color: #9ca3af; margin-top: 8px; }
  .browse-btn { background: #7A52F4; color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 14px; font-weight: 600; cursor: pointer; margin: 8px 0; }
  .browse-btn:hover { background: #6d3fd8; }
  .image-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .image-card { position: relative; border-radius: 10px; overflow: hidden; border: 1px solid #e5e7eb; background: white; }
  .image-card img { width: 100%; height: 90px; object-fit: cover; display: block; }
  .image-card .loading { width: 100%; height: 90px; background: #f3f4f6; display: flex; align-items: center; justify-content: center; }
  .spinner { width: 24px; height: 24px; border: 3px solid #e5e7eb; border-top-color: #7A52F4; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .score-badge { position: absolute; top: 4px; left: 4px; border-radius: 4px; padding: 2px 6px; font-size: 11px; font-weight: 700; color: white; }
  .score-badge.good { background: #22c55e; }
  .score-badge.warning { background: #f59e0b; }
  .score-badge.bad { background: #ef4444; }
  .card-actions { display: flex; gap: 4px; padding: 4px; background: white; }
  .card-btn { flex: 1; border: 1px solid #e5e7eb; background: white; border-radius: 4px; padding: 3px; font-size: 11px; cursor: pointer; text-align: center; }
  .card-btn:hover { background: #f9fafb; }
  .card-btn.remove:hover { background: #fef2f2; color: #dc2626; }
  .card-meta { padding: 4px 6px; font-size: 10px; color: #6b7280; background: white; }
  .error-card { width: 100%; height: 90px; background: #fef2f2; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #dc2626; text-align: center; padding: 8px; }
  .add-more-zone { border: 1px dashed #d1d5db; border-radius: 8px; padding: 12px; text-align: center; color: #6b7280; font-size: 13px; cursor: pointer; margin-bottom: 12px; transition: all 0.2s; }
  .add-more-zone:hover, .add-more-zone.drag-over { border-color: #7A52F4; background: #f5f3ff; }
  .add-more-zone span { color: #7A52F4; text-decoration: underline; cursor: pointer; }
  .generate-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .generate-btn:disabled { background: #e5e7eb; color: #9ca3af; cursor: not-allowed; }
  .generate-btn.active { background: #7A52F4; color: white; }
  .generate-btn.active:hover { background: #6d3fd8; }
  .generate-btn.ready { background: #7A52F4; color: white; box-shadow: 0 4px 12px rgba(122,82,244,0.3); }
  .settings-screen { display: none; }
  .settings-screen h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; }
  .form-group input:focus { border-color: #7A52F4; box-shadow: 0 0 0 3px rgba(122,82,244,0.1); }
  .save-btn { width: 100%; background: #7A52F4; color: white; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
  .save-btn:hover { background: #6d3fd8; }
  .back-btn { width: 100%; background: white; color: #6b7280; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px; font-size: 14px; cursor: pointer; margin-top: 8px; }
  .saved-key { font-size: 12px; color: #6b7280; margin-top: 4px; }
  .processing-screen { display: none; text-align: center; padding: 20px; }
  .processing-screen .check { font-size: 48px; margin-bottom: 12px; }
  .processing-screen h2 { font-size: 18px; font-weight: 700; color: #16a34a; margin-bottom: 8px; }
  .processing-screen p { color: #6b7280; font-size: 14px; margin-bottom: 8px; }
  .headshots-id { background: #f3f4f6; border-radius: 6px; padding: 8px 12px; font-family: monospace; font-size: 12px; word-break: break-all; margin: 8px 0; }
  .start-over-btn { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 10px 20px; font-size: 14px; cursor: pointer; margin-top: 12px; }
  .main-screen { display: none; }
  .tips-list { font-size: 10px; color: #6b7280; padding: 4px 6px; background: #fffbeb; }
</style>
</head>
<body>

<!-- Settings Screen -->
<div id="settings-screen" class="settings-screen">
  <div class="header">
    <h1>BetterPic AI Headshots</h1>
  </div>
  <h2>⚙️ Settings</h2>
  <div class="form-group">
    <label>Runflow API Key</label>
    <input type="password" id="api-key-input" placeholder="bpe_live_...">
    <div class="saved-key" id="saved-key-display"></div>
  </div>
  <div class="form-group">
    <label>Callback URL <span style="font-weight:400;color:#9ca3af">(where results are sent)</span></label>
    <input type="url" id="callback-url-input" placeholder="https://webhook.site/your-id">
  </div>
  <button class="save-btn" onclick="saveSettings()">Save Settings</button>
  <button class="back-btn" id="back-btn" onclick="showScreen('main')" style="display:none">← Back</button>
</div>

<!-- Main Screen -->
<div id="main-screen" class="main-screen">
  <div class="header">
    <h1>BetterPic AI Headshots</h1>
    <button class="settings-btn" onclick="showScreen('settings')" title="Settings">⚙️</button>
  </div>

  <div id="score-bar" class="score-bar"></div>

  <div id="drop-zone" class="drop-zone">
    <div class="icon">📸</div>
    <p>Drag & drop photos here</p>
    <p style="font-size:13px;color:#9ca3af">or</p>
    <button class="browse-btn" onclick="event.stopPropagation(); document.getElementById('mainFileInput').click()">Browse Photos</button>
    <p class="hint">JPEG, PNG, WebP · Up to 10 photos</p>
  </div>

  <div id="image-grid" class="image-grid" style="display:none"></div>
  <div id="add-more-zone" class="add-more-zone" style="display:none">
    + Drop more photos here or <span onclick="document.getElementById('mainFileInput').click()">browse</span>
  </div>

  <button id="generate-btn" class="generate-btn" disabled onclick="generateHeadshots()">
    Need at least 3 images
  </button>
</div>

<!-- Processing Screen -->
<div id="processing-screen" class="processing-screen">
  <div class="check">✅</div>
  <h2>Job Submitted!</h2>
  <p>Your 60 headshots will be ready in approximately 2 hours.</p>
  <div class="headshots-id" id="headshots-id">Waiting for confirmation...</div>
  <p style="font-size:12px">Results sent to: <strong id="callback-display"></strong></p>
  <button class="start-over-btn" onclick="startOver()">Start Over</button>
</div>

<input type="file" id="mainFileInput" multiple accept="image/jpeg,image/png,image/webp" style="display:none" onchange="handleFileSelect(event)">

<script>
  let images = [];
  let apiKey = localStorage.getItem('runflow_api_key') || '';
  let callbackUrl = localStorage.getItem('runflow_callback_url') || 'https://webhook.site/test';

  // Pending tool call resolvers: id -> { resolve, reject }
  const pendingToolCalls = {};

  function init() {
    if (!apiKey) {
      showScreen('settings');
    } else {
      showScreen('main');
      sendTool('save-settings', { apiKey, callbackUrl });
    }
    setupDropZones();
  }

  function showScreen(name) {
    document.getElementById('settings-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('processing-screen').style.display = 'none';

    if (name === 'settings') {
      document.getElementById('settings-screen').style.display = 'block';
      document.getElementById('api-key-input').value = '';
      document.getElementById('callback-url-input').value = callbackUrl;
      if (apiKey) {
        document.getElementById('saved-key-display').textContent = 'Saved: ' + apiKey.substring(0, 12) + '***';
        document.getElementById('back-btn').style.display = 'block';
      }
    } else if (name === 'main') {
      document.getElementById('main-screen').style.display = 'block';
      renderImages();
    } else if (name === 'processing') {
      document.getElementById('processing-screen').style.display = 'block';
      document.getElementById('callback-display').textContent = callbackUrl;
    }
  }

  function saveSettings() {
    const keyInput = document.getElementById('api-key-input').value.trim();
    const cbInput = document.getElementById('callback-url-input').value.trim();
    if (keyInput) apiKey = keyInput;
    if (cbInput) callbackUrl = cbInput;
    if (!apiKey) { alert('Please enter your Runflow API key.'); return; }
    localStorage.setItem('runflow_api_key', apiKey);
    localStorage.setItem('runflow_callback_url', callbackUrl);
    sendTool('save-settings', { apiKey, callbackUrl });
    showScreen('main');
  }

  // Send a tool call (fire and forget)
  function sendTool(name, args) {
    window.parent.postMessage({
      jsonrpc: '2.0',
      id: Date.now(),
      method: 'tools/call',
      params: { name, arguments: args }
    }, '*');
  }

  // Send a tool call and wait for the result
  function callToolAndWait(name, args) {
    return new Promise((resolve, reject) => {
      const id = Date.now() + Math.random();
      const timeout = setTimeout(() => {
        delete pendingToolCalls[id];
        reject(new Error('Tool call timed out after 30s'));
      }, 30000);

      pendingToolCalls[id] = { resolve, reject, timeout };

      window.parent.postMessage({
        jsonrpc: '2.0',
        id,
        method: 'tools/call',
        params: { name, arguments: args }
      }, '*');
    });
  }

  // Convert file to base64 data URI
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function handleFileSelect(event) {
    const files = Array.from(event.target.files);
    processFiles(files);
    event.target.value = '';
  }

  async function processFiles(files) {
    for (const file of files) {
      if (images.length >= 10) break;
      if (!file.type.startsWith('image/')) continue;
      await addAndScoreImage(file);
    }
  }

  async function addAndScoreImage(file) {
    if (!apiKey) { showScreen('settings'); return; }

    const tempId = Date.now() + Math.random();
    const objectUrl = URL.createObjectURL(file);
    images.push({ tempId, objectUrl, status: 'scoring' });
    renderImages();

    try {
      const base64 = await fileToBase64(file);

      // Call proxy on our server (avoids CORS)
      const serverUrl = 'https://betterpic-headshots.vercel.app';
      const response = await fetch(serverUrl + '/proxy/score', {
        method: 'POST',
        headers: { 
          'Content-Type': 'application/json',
          'ngrok-skip-browser-warning': 'true'
        },
        body: JSON.stringify({ image_base64: base64, mime_type: file.type })
      });

      if (!response.ok) throw new Error('Score failed: ' + response.status);
      const data = await response.json();

      const img = images.find(i => i.tempId === tempId);
      if (img) {
        Object.assign(img, {
          status: 'scored',
          imageUrl: base64,
          quality_score: data.quality_score,
          brightness: data.brightness,
          sharpness: data.sharpness,
          tips: data.tips || []
        });
      }
    } catch (err) {
      const img = images.find(i => i.tempId === tempId);
      if (img) { img.status = 'error'; img.error = err.message; }
    }

    renderImages();
    updateAverageScore();
  }

  function removeImage(tempId) {
    const idx = images.findIndex(i => i.tempId === tempId);
    if (idx !== -1) {
      URL.revokeObjectURL(images[idx].objectUrl);
      images.splice(idx, 1);
    }
    renderImages();
    updateAverageScore();
  }

  function replaceImage(tempId) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/jpeg,image/png,image/webp';
    input.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      removeImage(tempId);
      await addAndScoreImage(file);
    };
    input.click();
  }

  function renderImages() {
    const dropZone = document.getElementById('drop-zone');
    const grid = document.getElementById('image-grid');
    const addMore = document.getElementById('add-more-zone');
    const genBtn = document.getElementById('generate-btn');

    if (images.length === 0) {
      dropZone.style.display = 'block';
      grid.style.display = 'none';
      addMore.style.display = 'none';
    } else {
      dropZone.style.display = 'none';
      grid.style.display = 'grid';
      addMore.style.display = images.length < 10 ? 'block' : 'none';
    }

    grid.innerHTML = images.map(img => {
      const scoreClass = img.quality_score >= 0.7 ? 'good' : img.quality_score >= 0.4 ? 'warning' : 'bad';
      const tipsHtml = img.tips?.length ? `<div class="tips-list">💡 ${img.tips[0]}</div>` : '';
      return `
        <div class="image-card">
          ${img.status === 'scoring' ? `
            <div class="loading"><div class="spinner"></div></div>
            <div class="card-meta">Scoring...</div>
          ` : img.status === 'error' ? `
            <div class="error-card">⚠️ ${img.error || 'Error'}</div>
            <div class="card-meta">Failed</div>
          ` : `
            <img src="${img.objectUrl}" alt="Photo">
            <div class="score-badge ${scoreClass}">${img.quality_score?.toFixed(2)}</div>
            <div class="card-meta">☀️ ${img.brightness?.toFixed(0)} · 🔍 ${img.sharpness?.toFixed(0)}</div>
            ${tipsHtml}
          `}
          <div class="card-actions">
            <button class="card-btn remove" onclick="removeImage(${img.tempId})">✕ Remove</button>
            <button class="card-btn" onclick="replaceImage(${img.tempId})">🔄 Replace</button>
          </div>
        </div>
      `;
    }).join('');

    const scoredCount = images.filter(i => i.status === 'scored').length;
    genBtn.disabled = scoredCount < 3;
    genBtn.className = 'generate-btn' + (scoredCount >= 6 ? ' ready' : scoredCount >= 3 ? ' active' : '');
    if (scoredCount < 3) genBtn.textContent = 'Need at least 3 images';
    else if (scoredCount >= 6) genBtn.textContent = '✓ Generate 60 Headshots →';
    else genBtn.textContent = `Generate with ${scoredCount} images`;
  }

  function updateAverageScore() {
    const scored = images.filter(i => i.status === 'scored');
    const bar = document.getElementById('score-bar');
    if (scored.length === 0) { bar.style.display = 'none'; return; }
    const avg = scored.reduce((sum, i) => sum + i.quality_score, 0) / scored.length;
    const cls = avg >= 0.7 ? 'good' : avg >= 0.4 ? 'warning' : 'bad';
    bar.className = 'score-bar ' + cls;
    bar.style.display = 'block';
    bar.textContent = `${scored.length} / 6 images · Avg score: ${avg.toFixed(2)} ${avg >= 0.7 ? '✓' : avg >= 0.4 ? '!' : '✗'}`;
  }

  async function generateHeadshots() {
    const readyImages = images.filter(i => i.status === 'scored');
    if (readyImages.length < 3) return;
    const imageUrls = readyImages.map(i => i.imageUrl);
    showScreen('processing');
    sendTool('generate-headshots', { images: imageUrls, callbackUrl });
  }

  function startOver() {
    images.forEach(i => URL.revokeObjectURL(i.objectUrl));
    images = [];
    showScreen('main');
  }

  // Listen for tool results
  window.addEventListener('message', (e) => {
    if (e.source !== window.parent) return;
    const msg = e.data;
    if (!msg || msg.jsonrpc !== '2.0') return;

    // Match response to pending call
    if (msg.id && pendingToolCalls[msg.id]) {
      const { resolve, reject, timeout } = pendingToolCalls[msg.id];
      clearTimeout(timeout);
      delete pendingToolCalls[msg.id];
      if (msg.result) resolve(msg.result?.structuredContent ?? msg.result);
      else if (msg.error) reject(new Error(msg.error.message));
      return;
    }

    // Tool result notifications
    if (msg.method === 'ui/notifications/tool-result') {
      const sc = msg.params?.structuredContent;

      // Check if it's a score result with pending calls
      if (sc?.results) {
        const pendingIds = Object.keys(pendingToolCalls);
        if (pendingIds.length > 0) {
          const { resolve, reject, timeout } = pendingToolCalls[pendingIds[0]];
          clearTimeout(timeout);
          delete pendingToolCalls[pendingIds[0]];
          resolve(sc);
        }
      }

      // Generation result
      if (sc?.headshots_id) {
        document.getElementById('headshots-id').textContent = sc.headshots_id;
        showScreen('processing');
      }
    }
  });

  window.addEventListener('openai:set_globals', (e) => {
    const sc = e.detail?.globals?.toolOutput;
    if (sc?.headshots_id) {
      document.getElementById('headshots-id').textContent = sc.headshots_id;
      showScreen('processing');
    }
  });

  function setupDropZones() {
    const dropZone = document.getElementById('drop-zone');
    const addMore = document.getElementById('add-more-zone');

    function setupZone(zone) {
      zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', async (e) => {
        e.preventDefault();
        zone.classList.remove('drag-over');
        const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
        await processFiles(files);
      });
    }

    setupZone(dropZone);
    setupZone(addMore);

    dropZone.addEventListener('click', (e) => {
      if (e.target.tagName !== 'BUTTON') document.getElementById('mainFileInput').click();
    });
    addMore.addEventListener('click', () => document.getElementById('mainFileInput').click());
  }

  init();
</script>
</body>
</html>
